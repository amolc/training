<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtest Error</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #020617;
            color: #e2e8f0;
        }
        .card {
            width: min(760px, 92vw);
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
        }
        h1 { margin-top: 0; color: #f87171; }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #020617;
            padding: 12px;
            border-radius: 8px;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Backtest Failed</h1>
        <p>Please check the error details below:</p>
        <pre>{{ error }}</pre>
        <a href="{% url 'home' %}">Go back to dashboard</a>
    </div>
</body>
</html>
