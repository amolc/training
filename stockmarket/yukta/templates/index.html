<!DOCTYPE html>
<html>
<head>
<title>Yukta Dashboard</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#0a0f2c);
    color:white;
    font-family:sans-serif;
}

.container { text-align:center; }

select {
    padding:10px;
    border-radius:8px;
    margin-bottom:20px;
}

button {
    padding:18px 40px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
    cursor:pointer;
}

.loader {
    display:none;
    margin-top:20px;
}

</style>

<script>
function showLoader(){
    document.getElementById("loader").style.display="block";
}
</script>

</head>

<body>

<div class="container">
    <h1>📊 Yukta Trading</h1>

    <form action="{% url 'run_backtest' %}" method="get" onsubmit="showLoader()">

        <select name="strategy">
            <option>EMA Alligator Strategy</option>
        </select>

        <br>
        <button type="submit">▶ Run Backtest</button>

        <div id="loader" class="loader">
            ⏳ Running Backtest...
        </div>

    </form>
</div>

</body>
</html>
